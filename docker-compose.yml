name: spring-cloud

networks:
  spring-cloud:
    driver: bridge

x-spring-docker-env: &spring-docker-env
  SPRING_PROFILES_ACTIVE: prod,native
  EUREKA_URL: http://discovery:8761/eureka/
  EUREKA_INSTANCE_PREFER_IP_ADDRESS: "false"
  EUREKA_IP: host.docker.internal

services:
  mariadb:
    image: mariadb:11
    networks:
      - spring-cloud
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-123456a@A}
    ports:
      - "${MARIADB_PORT:-3306}:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    networks:
      - spring-cloud
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    networks:
      - spring-cloud
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-admin123}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    restart: unless-stopped

  discovery:
    build:
      context: .
      dockerfile: discovery/Dockerfile
    networks:
      - spring-cloud
    ports:
      - "${DISCOVERY_PORT:-8761}:8761"
    restart: unless-stopped

  config:
    build:
      context: .
      dockerfile: config/Dockerfile
    networks:
      - spring-cloud
    ports:
      - "${CONFIG_PORT:-8888}:8888"
    environment:
      <<: *spring-docker-env
    depends_on:
      - discovery
    restart: unless-stopped

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    networks:
      - spring-cloud
    ports:
      - "${GATEWAY_PORT:-8000}:8000"
    environment:
      <<: *spring-docker-env
    depends_on:
      discovery:
        condition: service_started
      config:
        condition: service_started
      redis:
        condition: service_healthy
    restart: unless-stopped

  auth:
    build:
      context: .
      dockerfile: auth/Dockerfile
    networks:
      - spring-cloud
    ports:
      - "${AUTH_PORT:-8001}:8001"
    environment:
      <<: *spring-docker-env
      MARIADB_USER: root
      MARIADB_PASSWORD: ${MARIADB_ROOT_PASSWORD:-123456a@A}
      RABBITMQ_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-admin123}
    depends_on:
      discovery:
        condition: service_started
      config:
        condition: service_started
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  users:
    build:
      context: .
      dockerfile: user/Dockerfile
    networks:
      - spring-cloud
    ports:
      - "${USERS_PORT:-8002}:8002"
    environment:
      <<: *spring-docker-env
      MARIADB_USER: root
      MARIADB_PASSWORD: ${MARIADB_ROOT_PASSWORD:-123456a@A}
      RABBITMQ_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-admin123}
    depends_on:
      discovery:
        condition: service_started
      config:
        condition: service_started
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mariadb_data:
