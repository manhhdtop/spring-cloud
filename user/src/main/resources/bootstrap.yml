eureka:
  client:
    service-url:
      defaultZone: ${EUREKA.URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: ${EUREKA_INSTANCE_PREFER_IP_ADDRESS:true}
    ip-address: ${EUREKA.IP:127.0.0.1}

spring:
  config:
    import: "optional:configserver:"
  cloud:
    config:
      discovery:
        enabled: true
        service-id: config
      profile: ${SPRING_PROFILES_ACTIVE:local}
